name: CustomComic
options:
  bundleIdPrefix: com.customcomic
  deploymentTarget:
    iOS: "16.0"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19

targets:
  CustomComic:
    type: application
    platform: iOS
    sources:
      - path: CustomComic
    dependencies:
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.customcomic.reader
        PRODUCT_NAME: CustomComic
        INFOPLIST_FILE: CustomComic/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
