name: YuzuSideload
options:
  bundleIdPrefix: com.yuzu
  deploymentTarget:
    iOS: "16.0"
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
targets:
  YuzuSideload:
    type: application
    platform: iOS
    sources:
      - path: YuzuSideload
    dependencies:
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuzu.sideload
        PRODUCT_NAME: 柚子側載
        INFOPLIST_FILE: YuzuSideload/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
