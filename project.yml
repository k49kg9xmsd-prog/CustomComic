name: CustomComic
options:
  bundleIdPrefix: com.customcomic
  deploymentTarget:
    iOS: "16.0"
targets:
  CustomComic:
    type: application
    platform: iOS
    sources:
      - path: CustomComic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.customcomic.reader
        PRODUCT_NAME: CustomComic
        INFOPLIST_FILE: CustomComic/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
