workflows:
  ios-unsigned:
    name: Build CustomComic unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Build unsigned app
        script: |
          set -o pipefail
          xcodebuild \
            -project CustomComic.xcodeproj \
            -scheme CustomComic \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee xcodebuild.log
      - name: Package unsigned IPA
        script: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          rm -rf Payload
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry CustomComic-unsigned.ipa Payload
          /usr/bin/unzip -l CustomComic-unsigned.ipa
    artifacts:
      - CustomComic-unsigned.ipa
      - xcodebuild.log
